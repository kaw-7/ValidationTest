name: MAUI Full Validation (Windows/Android/iOS/MacCatalyst/macOS)
on: [push, pull_request]

env:
  DOTNET_VERSION: '10.0.x'
  WORKLOAD_VERSION: '10.0.100'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node 24 early

jobs:
  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install platform-specific workloads
      # Added ignore-failed-sources for stability
      run: dotnet workload install maui-windows --version ${{ env.WORKLOAD_VERSION }} --ignore-failed-sources

    - name: Restore Packages (Targeted)
      # Adding the explicit path to the project file prevents MSB1009
      run: |
        dotnet restore ValidationTest.csproj \
        -p:TargetFramework=net10.0-windows10.0.19041.0 \
        -r win-x64 \
        -p:CheckEagerWorkloadRegistration=false

    - name: Build Windows
      # Use the project path here as well to be safe
      run: |
        dotnet build ValidationTest.csproj \
        --framework net10.0-windows10.0.19041.0 \
        -c Release \
        -r win-x64 \
        --no-restore

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-app
        # Note: Ensure this path matches your project structure 
        # (e.g., bin/Release/net10.0-windows10.0.19041.0/win10-x64/publish if you use publish)
        path: bin/Release/net10.0-windows10.0.19041.0/

  android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Install platform-specific workloads
      run: |
        dotnet workload install ${{ matrix.platform }} --version ${{ env.WORKLOAD_VERSION }} --ignore-failed-sources
        dotnet workload restore --ignore-failed-sources
    - name: Build Android
      run: dotnet build -f net10.0-android -c Release
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/Release/net10.0-android/*.apk

  apple:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # 1. Install workloads FIRST. 
    # Removed the explicit version as it often causes 404s on preview SDKs.
    - name: Install MAUI workloads
      run: dotnet workload install maui-ios maui-maccatalyst maui-android --ignore-failed-sources

    # 2. Restore packages while telling the SDK not to panic about missing workloads
    - name: Restore project
      run: dotnet restore --disable-parallel -p:CheckEagerWorkloadRegistration=false

    - name: List available Xcode versions
      run: ls /Applications | grep Xcode
      
    - name: Build iOS
      #run: dotnet build -f net10.0-ios -c Release --no-restore
      run: |
        dotnet build ValidationTest.csproj \
          -f net10.0-ios \
          -c Release \
          --no-restore \
          -p:ValidateXcodeVersion=false \
          -p:_SkipXcodeVersionCheck=true
          
  maccatalyst:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # 1. Install workloads FIRST. 
    # Removed the explicit version as it often causes 404s on preview SDKs.
    - name: Install MAUI workloads
      run: dotnet workload install maui-maccatalyst --ignore-failed-sources

    # 2. Restore packages while telling the SDK not to panic about missing workloads
    - name: Restore project (Targeted)
      #run: dotnet restore --disable-parallel -p:CheckEagerWorkloadRegistration=false
      run: |
        dotnet restore ValidationTest.csproj \
          -p:TargetFramework=net10.0-maccatalyst \
          -r maccatalyst-arm64 \
          -p:CheckEagerWorkloadRegistration=false
      
    - name: Build MacCatalyst
      run: |
        dotnet build ValidationTest.csproj \
          -f net10.0-maccatalyst \
          -c Release \
          -r maccatalyst-arm64 \
          --no-restore \
          -p:MtouchLink=None \
          -p:ValidateXcodeVersion=false \
          -p:_SkipXcodeVersionCheck=true