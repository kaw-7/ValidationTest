name: MAUI Full Validation (Windows/Android/iOS/MacCatalyst/macOS)
on: [push, pull_request]

env:
  DOTNET_VERSION: '10.0.x'
  WORKLOAD_VERSION: '10.0.100'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node 24 early

jobs:
  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore project (skip workloads)
      run: dotnet restore --disable-parallel
    - name: Install platform-specific workloads
      run: dotnet workload install maui-windows --version ${{ env.WORKLOAD_VERSION }} --ignore-failed-sources
    - name: Restore workloads
      run: dotnet workload restore
    - name: Build Windows
      run: dotnet build -f net10.0-windows10.0.19041.0 -c Release
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-app
        path: bin/Release/net10.0-windows10.0.19041.0/

  android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore dependencies and workloads
      run: |
        dotnet restore --use-rest-source
    - name: Install platform-specific workloads
      run: |
        dotnet workload install ${{ matrix.platform }} --version ${{ env.WORKLOAD_VERSION }} --ignore-failed-sources
        dotnet workload restore --ignore-failed-sources
    - name: Build Android
      run: dotnet build -f net10.0-android -c Release
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/Release/net10.0-android/*.apk

  apple:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore project
      run: dotnet restore --disable-parallel
    - name: Install MAUI workloads
      run: |
        dotnet workload install maui-ios maui-maccatalyst --version ${{ env.WORKLOAD_VERSION }} --ignore-failed-sources
    - name: Restore workloads
      run: dotnet workload restore
    - name: Build iOS
      run: dotnet build -f net10.0-ios -c Release
    - name: Build MacCatalyst
      run: dotnet build -f net10.0-maccatalyst -c Release